<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD2 Loadouts</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
:root {
  --bg: #0d0d14;
  --surface: #14141e;
  --surface2: #1a1a28;
  --border: #252535;
  --accent: #f5c400;
  --accent-dim: #9a7c00;
  --text: #e0e0e0;
  --text-dim: #666;
  --bugs: #4caf50;
  --bots: #ef5350;
  --squids: #8b7cf6;
  --bugs-bg: #0f2312;
  --bots-bg: #200f0f;
  --squids-bg: #150f2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  min-height: 100vh;
  padding: 20px 24px;
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
h1 {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  white-space: nowrap;
}
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.search-wrap {
  position: relative;
  flex: 0 0 200px;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px 5px 28px;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
}
.search-wrap input:focus { outline: none; border-color: var(--accent-dim); }
.search-icon {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 12px;
  pointer-events: none;
}
.divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.filter-btn {
  padding: 4px 13px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: color 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.filter-btn.bugs.active { background: var(--bugs); border-color: var(--bugs); color: #000; }
.filter-btn.bots.active { background: var(--bots); border-color: var(--bots); color: #000; }
.filter-btn.squids.active { background: var(--squids); border-color: var(--squids); color: #000; }
.spacer { flex: 1; }
.btn-add {
  padding: 5px 15px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 700;
  font-size: 12px;
  font-family: inherit;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.btn-add:hover { background: #ffd000; }
/* ── File banner ─────────────────────────────────────────────── */
#fileBanner { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin-bottom: 10px; border-radius: 4px; font-size: 11px; }
#fileBanner.fb-unlinked { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
#fileBanner.fb-resume   { background: var(--surface); border: 1px solid var(--accent-dim); }
#fileBanner.fb-active   { background: var(--surface); border: 1px solid #1f3a1f; color: var(--text-dim); }
.fb-btn { background: none; border: 1px solid var(--border); color: var(--accent); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; }
.fb-btn:hover { background: var(--accent); color: #000; }
.fb-btn-dim { color: var(--text-dim); }
.fb-btn-dim:hover { background: var(--surface2); color: var(--text); }

.btn-export {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  white-space: nowrap;
}
.btn-export:hover { border-color: var(--accent-dim); color: var(--text); }
.count { font-size: 11px; color: var(--text-dim); }
table { width: 100%; border-collapse: collapse; }
colgroup col:nth-child(1) { width: 16%; }
colgroup col:nth-child(2) { width: 11%; }
colgroup col:nth-child(3) { width: 33%; }
colgroup col:nth-child(4) { width: 35%; }
colgroup col:nth-child(5) { width: 5%; }
th {
  text-align: left;
  padding: 7px 12px;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  color: var(--accent);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
}
th.sortable { cursor: pointer; }
th.sortable:hover { color: #fff; }
th.sort-asc::after { content: ' ↑'; }
th.sort-desc::after { content: ' ↓'; }
td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  white-space: pre-wrap;
  line-height: 1.55;
}
tr:hover td { background: var(--surface2); }
.col-name { font-weight: 600; color: #fff; }
.col-factions { white-space: normal; }
.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  margin: 1px 2px 1px 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge-bugs { background: var(--bugs-bg); color: var(--bugs); }
.badge-bots { background: var(--bots-bg); color: var(--bots); }
.badge-squids { background: var(--squids-bg); color: var(--squids); }
.badge-gen { color: var(--text-dim); font-size: 10px; font-weight: normal; font-style: italic; }
.col-edit { text-align: center; }
.btn-edit {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 3px;
  font-size: 13px;
  line-height: 1;
}
.btn-edit:hover { color: var(--accent); background: var(--surface2); }
.empty { text-align: center; color: var(--text-dim); padding: 40px; font-style: italic; }
.notes-block {
  margin-top: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent-dim);
  border-radius: 6px;
  padding: 14px 16px;
}
.notes-block-title {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
  font-weight: 700;
}
.notes-block p { color: var(--text-dim); line-height: 1.7; }

/* Modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 480px;
  max-width: 96vw;
  max-height: 92vh;
  overflow-y: auto;
}
.modal-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}
.field { margin-bottom: 15px; }
.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.field input, .field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
  resize: vertical;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent-dim); }
.field input.error { border-color: var(--bots); }
.faction-checks { display: flex; gap: 18px; }
.faction-check {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text);
}
.faction-check input[type=checkbox] {
  width: auto;
  accent-color: var(--accent);
  cursor: pointer;
}
.modal-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.btn-save {
  padding: 7px 20px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 700;
  font-size: 12px;
  font-family: inherit;
}
.btn-save:hover { background: #ffd000; }
.btn-cancel {
  padding: 7px 16px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
.btn-cancel:hover { color: var(--text); }
.btn-delete {
  margin-right: auto;
  padding: 7px 14px;
  background: transparent;
  color: var(--bots);
  border: 1px solid var(--bots);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
.btn-delete:hover { background: var(--bots-bg); }

/* ── Faction board panel ────────────────────────────────────────── */
#factionPanel { margin-bottom: 12px; }
.fp-wrap { padding: 10px 14px; border-radius: 6px; border-left: 3px solid; display: flex; flex-direction: column; gap: 7px; }
.fp-wrap.fp-bugs   { border-color: var(--bugs);   background: rgba(76,175,80,.04); }
.fp-wrap.fp-bots   { border-color: var(--bots);   background: rgba(239,83,80,.04); }
.fp-wrap.fp-squids { border-color: var(--squids); background: rgba(139,124,246,.04); }
.fp-row { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; min-height: 24px; }
.fp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
  color: var(--text-dim); min-width: 90px; cursor: pointer; line-height: 1; user-select: none; }
.fp-label:hover { color: var(--text); }
.fp-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.fp-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px 2px 8px;
  border-radius: 12px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); line-height: 1.4; }
.fp-chip-bugs   { border-color: rgba(76,175,80,.45);  color: var(--bugs); }
.fp-chip-bots   { border-color: rgba(239,83,80,.45);  color: var(--bots); }
.fp-chip-squids { border-color: rgba(139,124,246,.45); color: var(--squids); }
.fp-chip-strat-r { border-color: rgba(239,83,80,.45);  color: #ef5350; }
.fp-chip-strat-b { border-color: rgba(74,158,255,.45); color: #4a9eff; }
.fp-chip-strat-g { border-color: rgba(76,175,80,.45);  color: #4caf50; }
.fp-chip[draggable] { cursor: grab; }
.fp-chip[draggable]:active { cursor: grabbing; }
.fp-chip.dragging { opacity: 0.35; }
.fp-chip.drag-left  { box-shadow: -3px 0 0 var(--accent); }
.fp-chip.drag-right { box-shadow:  3px 0 0 var(--accent); }
.fp-chip-remove { background: none; border: none; cursor: pointer; font-size: 12px;
  color: inherit; opacity: 0.45; padding: 0; line-height: 1; }
.fp-chip-remove:hover { opacity: 1; }
.fp-add-item { background: none; border: 1px dashed var(--border); color: var(--text-dim);
  padding: 1px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; font-family: inherit; line-height: 1.4; }
.fp-add-item:hover { border-color: var(--accent); color: var(--accent); }
.fp-input { background: var(--surface2); border: 1px solid var(--accent); color: var(--text);
  padding: 2px 8px; border-radius: 12px; font-size: 11px; font-family: inherit; outline: none; width: 180px; }
.fp-search-row { position: relative; padding: 2px 0 2px 96px; }
.fp-dropdown { position: absolute; top: calc(100% + 2px); left: 96px; min-width: 220px; max-width: 320px;
  background: var(--surface); border: 1px solid var(--accent); border-radius: 4px;
  z-index: 100; max-height: 220px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
.fp-option { display: block; width: 100%; padding: 5px 11px; background: none; border: none;
  color: var(--text); text-align: left; cursor: pointer; font-size: 12px; font-family: inherit; }
.fp-option:hover, .fp-option:focus { background: var(--surface2); color: var(--accent); outline: none; }
.fp-option-empty { padding: 6px 11px; font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

<div id="fileBanner"></div>

<header>
  <h1>⚡ HD2 Loadouts</h1>
  <div class="spacer"></div>
  <button class="btn-export" onclick="exportHTML()">⬇ Save as file</button>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="Search…" oninput="render()">
  </div>
  <div class="divider"></div>
  <button class="filter-btn active" data-faction="all" onclick="setFaction(this)">All</button>
  <button class="filter-btn bugs"   data-faction="bugs"   onclick="setFaction(this)">🦟 Bugs</button>
  <button class="filter-btn bots"   data-faction="bots"   onclick="setFaction(this)">🤖 Bots</button>
  <button class="filter-btn squids" data-faction="squids" onclick="setFaction(this)">🦑 Squids</button>
  <div class="divider"></div>
  <span class="count" id="countLabel"></span>
  <div class="spacer"></div>
  <button class="btn-add" onclick="openModal()">+ Add Loadout</button>
</div>

<div id="factionPanel"></div>

<table>
  <colgroup><col><col><col><col><col></colgroup>
  <thead>
    <tr>
      <th class="sortable" id="th-name" onclick="setSort('name')">Name</th>
      <th>Factions</th>
      <th class="sortable" id="th-build" onclick="setSort('build')">Core Build</th>
      <th>Notes</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="notes-block">
  <div class="notes-block-title">General Notes</div>
  <p>Throwing: ~45–50m at 45°, ~75–80m with dive<br>
  Command Bunker: target lower 3 heat sinks → hatch opens → toss any throwable. Top slots optional; the slot-shaped thing is <em>not</em> part of the body.</p>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Loadout</div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="fName" placeholder="e.g. 💎 Anti-tank">
    </div>
    <div class="field">
      <label>Factions</label>
      <div class="faction-checks">
        <label class="faction-check"><input type="checkbox" id="fBugs"> 🦟 Bugs</label>
        <label class="faction-check"><input type="checkbox" id="fBots"> 🤖 Bots</label>
        <label class="faction-check"><input type="checkbox" id="fSquids"> 🦑 Squids</label>
      </div>
    </div>
    <div class="field">
      <label>Core Build</label>
      <textarea id="fBuild" rows="7" placeholder="armor, primary, secondary, grenade&#10;&#10;stratagem 1&#10;stratagem 2&#10;stratagem 3&#10;stratagem 4"></textarea>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" rows="5" placeholder="tips, breakpoints, synergies…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btnDelete" onclick="deleteRow()" style="display:none">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

// ── Storage ────────────────────────────────────────────────────────────────
const LS_KEY = 'hd2_v1';

function loadData() {
  const raw = localStorage.getItem(LS_KEY);
  if (!raw) { localStorage.setItem(LS_KEY, JSON.stringify(SEED)); return SEED.map(r => ({...r})); }
  return JSON.parse(raw);
}

function persist(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));  // always keep as fallback
  fsWrite(data);                                        // also write to file if linked
}

// ── File System API ────────────────────────────────────────────────────────
let fsHandle  = null;   // FileSystemFileHandle
let fsReady   = false;  // permission currently granted

// Minimal IndexedDB wrapper — only used to persist the FileSystemFileHandle
function _idb(mode, fn) {
  return new Promise((res, rej) => {
    const r = indexedDB.open('hd2_fs', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => { try { res(fn(r.result.transaction('kv', mode).objectStore('kv'))); } catch(e) { rej(e); } };
    r.onerror   = () => rej(r.error);
  });
}
const idbGet = k    => _idb('readonly',  s => new Promise(r => { const q = s.get(k); q.onsuccess = () => r(q.result ?? null); q.onerror = () => r(null); }));
const idbSet = (k,v)=> _idb('readwrite', s => new Promise(r => { s.put(v,k); s.transaction.oncomplete = r; }));

async function fsWrite(rowsData) {
  if (!fsHandle || !fsReady) return;
  try {
    const w = await fsHandle.createWritable();
    await w.write(JSON.stringify({ rows: rowsData, boards }, null, 2));
    await w.close();
  } catch { fsReady = false; updateBanner(); }
}

async function _activateHandle(handle) {
  fsHandle = handle;
  fsReady  = true;
  await idbSet('fh', handle);
  // Read file — if it has data, load it; if empty/new, seed it with current rows
  let fileData = null;
  try {
    const txt = await (await handle.getFile()).text();
    if (txt.trim()) fileData = JSON.parse(txt);
  } catch {}
  if (fileData !== null) {
    const fileRows   = Array.isArray(fileData) ? fileData : fileData.rows;
    const fileBoards = !Array.isArray(fileData) ? fileData.boards : null;
    if (Array.isArray(fileRows))  { rows   = fileRows;   render(); }
    if (fileBoards)               { boards = fileBoards; renderPanel(); }
  } else { await fsWrite(rows); }
  updateBanner();
}

async function fsNew() {
  try {
    const h = await window.showSaveFilePicker({ suggestedName: 'loadouts.json', types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
    await _activateHandle(h);
  } catch {}
}

async function fsOpen() {
  try {
    const [h] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
    await _activateHandle(h);
  } catch {}
}

async function fsResume() {
  if (!fsHandle) return;
  try {
    if (await fsHandle.requestPermission({ mode: 'readwrite' }) !== 'granted') return;
    fsReady = true;
    const txt = await (await fsHandle.getFile()).text();
    if (txt.trim()) {
      const d = JSON.parse(txt);
      const fileRows   = Array.isArray(d) ? d : d.rows;
      const fileBoards = !Array.isArray(d) ? d.boards : null;
      if (Array.isArray(fileRows))  { rows   = fileRows;   render(); }
      if (fileBoards)               { boards = fileBoards; renderPanel(); }
    }
    updateBanner();
  } catch {}
}

function updateBanner() {
  const el = document.getElementById('fileBanner');
  if (!fsHandle) {
    el.className = 'fb-unlinked';
    el.innerHTML = `No save file linked &nbsp;<button class="fb-btn" onclick="fsNew()">New</button> <button class="fb-btn" onclick="fsOpen()">Open existing</button>`;
  } else if (!fsReady) {
    el.className = 'fb-resume';
    el.innerHTML = `📂 <b>${fsHandle.name}</b> &nbsp;<button class="fb-btn" onclick="fsResume()">Load</button>`;
  } else {
    el.className = 'fb-active';
    el.innerHTML = `💾 <b>${fsHandle.name}</b> &nbsp;<button class="fb-btn fb-btn-dim" onclick="fsOpen()">Change</button>`;
  }
}

async function initFS() {
  if (!('showOpenFilePicker' in window)) return; // file:// or unsupported browser — localStorage only
  try {
    const handle = await idbGet('fh');
    if (!handle) { updateBanner(); return; }
    fsHandle = handle;
    if (await handle.queryPermission({ mode: 'readwrite' }) === 'granted') {
      await fsResume();
    } else {
      updateBanner();
    }
  } catch { updateBanner(); }
}

// ── State ──────────────────────────────────────────────────────────────────
let rows = loadData();
let faction = 'all';
let sortKey = 'name';
let sortDir = 1;
let editId = null;

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let visible = rows.filter(r => {
    const matchFaction = faction === 'all' || r.factions.length === 0 || r.factions.includes(faction);
    const matchSearch = !q || r.name.toLowerCase().includes(q) || r.build.toLowerCase().includes(q) || r.notes.toLowerCase().includes(q);
    return matchFaction && matchSearch;
  });

  visible.sort((a, b) => {
    const av = (a[sortKey] || '').toLowerCase();
    const bv = (b[sortKey] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const tbody = document.getElementById('tbody');
  if (!visible.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No loadouts match.</td></tr>';
  } else {
    tbody.innerHTML = visible.map(r => `
      <tr>
        <td class="col-name">${x(r.name)}</td>
        <td class="col-factions">${factionBadges(r.factions)}</td>
        <td>${x(r.build)}</td>
        <td>${x(r.notes)}</td>
        <td class="col-edit"><button class="btn-edit" onclick="openModal(${r.id})" title="Edit">✎</button></td>
      </tr>`).join('');
  }

  document.getElementById('countLabel').textContent = `${visible.length} / ${rows.length}`;

  ['name', 'build'].forEach(k => {
    const th = document.getElementById('th-' + k);
    th.classList.remove('sort-asc', 'sort-desc');
    if (sortKey === k) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
}

function factionBadges(factions) {
  if (!factions.length) return '<span class="badge badge-gen">general</span>';
  return factions.map(f => `<span class="badge badge-${f}">${f}</span>`).join('');
}

function x(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
// Strip leading code designator (e.g. "G-31 Arc" → "Arc", "Eagle Airstrike" unchanged)
function shortName(s) { return s.replace(/^\S*\d\S* /, ''); }
const GENERIC_WEAPON_WORDS = new Set(['Pistol','Shotgun']);
function displayName(name, source) {
  const short = shortName(name);
  if (source.some(s => s !== name && shortName(s) === short)) return name; // duplicate → keep full
  if (GENERIC_WEAPON_WORDS.has(short)) return name;                        // bare type word → keep full
  return short;
}
function stratColor(name) { const c = STRATAGEM_CATS[name]; return `fp-chip-strat-${c || 'b'}`; }

// ── Sort & Filter ──────────────────────────────────────────────────────────
function setSort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  render();
}

function setFaction(btn) {
  faction = btn.dataset.faction;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPanel();
  render();
}

// ── Faction boards ─────────────────────────────────────────────────────────────
const BOARDS_KEY = LS_KEY + '_boards';
const BOARD_ROWS = [
  { key: 'weapons',    label: 'Weapons',    source: () => WEAPONS_LIST    },
  { key: 'grenades',   label: 'Grenades',   source: () => GRENADES_LIST   },
  { key: 'stratagems', label: 'Stratagems', source: () => STRATAGEMS_LIST },
];

function loadBoards() { try { return JSON.parse(localStorage.getItem(BOARDS_KEY) || '{}'); } catch { return {}; } }
function saveBoards() { localStorage.setItem(BOARDS_KEY, JSON.stringify(boards)); fsWrite(rows); }

let boards = loadBoards();
let dragState = null;

function clearDragIndicators() {
  document.querySelectorAll('.fp-chip.drag-left,.fp-chip.drag-right')
    .forEach(c => c.classList.remove('drag-left','drag-right'));
}
function attachChipDrag(chip) {
  chip.draggable = true;
  chip.addEventListener('dragstart', e => {
    dragState = { key: chip.dataset.key, fromIdx: parseInt(chip.dataset.idx) };
    chip.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  chip.addEventListener('dragend', () => {
    chip.classList.remove('dragging');
    clearDragIndicators();
    dragState = null;
  });
  chip.addEventListener('dragover', e => {
    if (!dragState || dragState.key !== chip.dataset.key) return;
    e.preventDefault();
    clearDragIndicators();
    const rect = chip.getBoundingClientRect();
    chip.classList.add(e.clientX > rect.left + rect.width / 2 ? 'drag-right' : 'drag-left');
  });
  chip.addEventListener('dragleave', e => {
    if (!chip.contains(e.relatedTarget)) chip.classList.remove('drag-left','drag-right');
  });
  chip.addEventListener('drop', e => {
    e.preventDefault();
    clearDragIndicators();
    if (!dragState || chip.dataset.key !== dragState.key) return;
    const fromIdx = dragState.fromIdx;
    const toIdx = parseInt(chip.dataset.idx);
    const rect = chip.getBoundingClientRect();
    let insertIdx = e.clientX > rect.left + rect.width / 2 ? toIdx + 1 : toIdx;
    const arr = boards[faction][dragState.key];
    const [item] = arr.splice(fromIdx, 1);
    if (insertIdx > fromIdx) insertIdx--;
    arr.splice(insertIdx, 0, item);
    saveBoards();
    renderPanel();
  });
}
// Migrate old array-based data
for (const f of ['bugs','bots','squids']) { if (Array.isArray(boards[f])) boards[f] = {}; }

function renderPanel() {
  const panel = document.getElementById('factionPanel');
  if (faction === 'all') { panel.innerHTML = ''; return; }
  const fc = faction;
  const fData = boards[fc] || {};
  let html = `<div class="fp-wrap fp-${fc}">`;
  BOARD_ROWS.forEach(row => {
    const items = fData[row.key] || [];
    html += `<div class="fp-row" id="fp-row-${row.key}">
      <span class="fp-label">${row.label}</span>
      <div class="fp-chips" id="fp-chips-${row.key}">
        ${items.map((item, idx) =>
          `<span class="fp-chip ${row.key === 'stratagems' ? stratColor(item) : 'fp-chip-' + fc}" data-key="${row.key}" data-idx="${idx}">${x(item)}<button class="fp-chip-remove" data-key="${row.key}" data-idx="${idx}">×</button></span>`
        ).join('')}
      </div>
      <button class="fp-add-item" data-key="${row.key}">+ item</button>
    </div>`;
  });
  html += `</div>`;
  panel.innerHTML = html;

  panel.querySelectorAll('.fp-chip-remove').forEach(btn =>
    btn.addEventListener('click', () => removeBoardChip(btn.dataset.key, parseInt(btn.dataset.idx))));
  panel.querySelectorAll('.fp-add-item').forEach(btn =>
    btn.addEventListener('click', () => startAddItem(btn.dataset.key)));
  panel.querySelectorAll('.fp-chip[data-key]').forEach(chip => attachChipDrag(chip));
}

function startAddItem(key) {
  // Close any already-open search
  document.getElementById('fp-search-active')?.remove();

  const rowEl = document.getElementById(`fp-row-${key}`);
  if (!rowEl) return;
  const source = BOARD_ROWS.find(r => r.key === key)?.source() || [];
  const existing = new Set((boards[faction]?.[key] || []));

  const searchDiv = document.createElement('div');
  searchDiv.id = 'fp-search-active';
  searchDiv.className = 'fp-search-row';

  const input = document.createElement('input');
  input.type = 'text'; input.className = 'fp-input'; input.placeholder = `Search ${key}…`;

  const dropdown = document.createElement('div');
  dropdown.className = 'fp-dropdown';

  searchDiv.appendChild(input);
  searchDiv.appendChild(dropdown);
  rowEl.after(searchDiv);

  function refreshDropdown() {
    const q = input.value.toLowerCase();
    const results = source.filter(s => !existing.has(s) && (!q || s.toLowerCase().includes(q)));
    dropdown.innerHTML = results.length
      ? results.map(s => `<button class="fp-option">${x(displayName(s, source))}</button>`).join('')
      : `<div class="fp-option-empty">No matches</div>`;
    dropdown.querySelectorAll('.fp-option').forEach(btn =>
      btn.addEventListener('mousedown', e => { e.preventDefault(); selectItem(btn.textContent); }));
  }

  function selectItem(name) {
    if (!boards[faction]) boards[faction] = {};
    if (!boards[faction][key]) boards[faction][key] = [];
    if (!boards[faction][key].includes(name)) {
      boards[faction][key].push(name);
      saveBoards();
      existing.add(name);
      // Append chip inline without full re-render
      const chipsDiv = document.getElementById(`fp-chips-${key}`);
      if (chipsDiv) {
        const idx = boards[faction][key].length - 1;
        const chip = document.createElement('span');
        chip.className = `fp-chip ${key === 'stratagems' ? stratColor(name) : 'fp-chip-' + faction}`;
        chip.dataset.key = key; chip.dataset.idx = String(idx);
        const rm = document.createElement('button');
        rm.className = 'fp-chip-remove'; rm.textContent = '×';
        rm.dataset.key = key; rm.dataset.idx = String(idx);
        rm.addEventListener('click', () => removeBoardChip(key, parseInt(rm.dataset.idx)));
        chip.append(document.createTextNode(name), rm);
        chipsDiv.appendChild(chip);
        attachChipDrag(chip);
      }
    }
    input.value = ''; refreshDropdown(); input.focus();
  }

  refreshDropdown();
  input.addEventListener('input', refreshDropdown);
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { searchDiv.remove(); }
    else if (e.key === 'Enter') { const first = dropdown.querySelector('.fp-option'); if (first) first.dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); dropdown.querySelector('.fp-option')?.focus(); }
  });
  dropdown.addEventListener('keydown', e => {
    const opts = [...dropdown.querySelectorAll('.fp-option')];
    const i = opts.indexOf(document.activeElement);
    if (e.key === 'ArrowDown') { e.preventDefault(); opts[i+1]?.focus(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); i > 0 ? opts[i-1].focus() : input.focus(); }
    else if (e.key === 'Enter' && i >= 0) { e.preventDefault(); opts[i].dispatchEvent(new MouseEvent('mousedown')); input.focus(); }
    else if (e.key === 'Escape') { searchDiv.remove(); }
  });

  // Close on outside click
  setTimeout(() => {
    function outsideClick(e) { if (!searchDiv.contains(e.target)) { searchDiv.remove(); document.removeEventListener('mousedown', outsideClick); } }
    document.addEventListener('mousedown', outsideClick);
  }, 0);

  input.focus();
}

function removeBoardChip(key, idx) {
  document.getElementById('fp-search-active')?.remove();
  const data = boards[faction]?.[key];
  if (!data) return;
  data.splice(idx, 1);
  saveBoards();
  renderPanel();
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Loadout' : 'Add Loadout';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
  document.getElementById('fName').classList.remove('error');

  const r = id ? rows.find(r => r.id === id) : null;
  document.getElementById('fName').value    = r ? r.name  : '';
  document.getElementById('fBugs').checked  = r ? r.factions.includes('bugs')   : false;
  document.getElementById('fBots').checked  = r ? r.factions.includes('bots')   : false;
  document.getElementById('fSquids').checked = r ? r.factions.includes('squids') : false;
  document.getElementById('fBuild').value   = r ? r.build : '';
  document.getElementById('fNotes').value   = r ? r.notes : '';

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveRow() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').classList.add('error'); document.getElementById('fName').focus(); return; }

  const factions = ['bugs', 'bots', 'squids'].filter(f =>
    document.getElementById('f' + f[0].toUpperCase() + f.slice(1)).checked
  );
  const build = document.getElementById('fBuild').value;
  const notes = document.getElementById('fNotes').value;

  if (editId) {
    const i = rows.findIndex(r => r.id === editId);
    rows[i] = { ...rows[i], name, factions, build, notes };
  } else {
    const nextId = rows.reduce((m, r) => Math.max(m, r.id), 0) + 1;
    rows.push({ id: nextId, name, factions, build, notes });
  }

  persist(rows);
  render();
  closeModal();
}

function deleteRow() {
  if (!editId || !confirm('Delete this loadout?')) return;
  rows = rows.filter(r => r.id !== editId);
  persist(rows);
  render();
  closeModal();
}

function exportHTML() {
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const newSeed = JSON.stringify(rows, null, 4);
  html = html.replace(
    /\/\/ SEED_BEGIN\n[\s\S]*?\/\/ SEED_END/,
    `// SEED_BEGIN\nconst SEED = ${newSeed};\n// SEED_END`
  );
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'text/html; charset=utf-8' }));
  a.download = 'loadouts.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.key === 'Enter') && document.getElementById('overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveRow();
  }
});

render();
renderPanel();
initFS();  // async — loads from file if handle stored, re-renders if data differs
</script>
</body>
</html>
