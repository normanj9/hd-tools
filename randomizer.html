<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD2 Randomizer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
:root {
  --bg:       #0d0d14;
  --surface:  #14141e;
  --surface2: #1a1a28;
  --border:   #252535;
  --accent:   #f5c400;
  --text:     #e0e0e0;
  --dim:      #666;
  --cat-support:  #4a9eff;
  --cat-orbital:  #ff4444;
  --cat-eagle:    #ff4444;
  --cat-emplace:  #4caf50;
  --cat-sentry:   #4caf50;
  --cat-backpack: #4a9eff;
  --cat-vehicle:  #4a9eff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; min-height: 100vh; padding: 20px 24px; max-width: 820px; }

header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 18px; }
h1 { font-size: 15px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
.header-note { font-size: 11px; color: var(--dim); }

/* ── Warbond toggles ────────────────────────────────────────────── */
.section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 8px; }
.wb-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.wb-btn {
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--dim); cursor: pointer; font-size: 11px;
  font-family: inherit; transition: border-color .1s, color .1s;
}
.wb-btn:hover { border-color: var(--accent); color: var(--text); }
.wb-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.wb-btn.wb-base { border-color: var(--accent); color: var(--accent); opacity: 0.5; cursor: default; font-weight: 600; }
.wb-btn.wb-legendary { border-color: #9f7aea; }
.wb-btn.wb-legendary:hover { border-color: #b794f4; color: var(--text); }
.wb-btn.wb-legendary.active { border-color: #b794f4; color: #b794f4; background: var(--surface2); }
.wb-sep { width: 100%; height: 0; border-top: 1px solid var(--border); margin: 4px 0 2px; position: relative; }
.wb-sep::before { content: attr(data-label); position: absolute; top: -8px; left: 0; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); background: var(--bg); padding-right: 6px; }

/* ── Randomize button ───────────────────────────────────────────── */
.btn-randomize {
  display: block; width: 100%; padding: 12px;
  background: var(--accent); color: #000; border: none; border-radius: 6px;
  font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; font-family: inherit; margin-bottom: 20px;
}
.btn-randomize:hover { background: #ffd000; }
.btn-randomize:active { transform: scale(0.99); }
.btn-randomize:disabled {
  background: #100e00; color: var(--accent); cursor: not-allowed;
  border: 1px solid rgba(245,196,0,0.5);
  animation: btn-deploying 0.9s ease-in-out infinite;
}
@keyframes btn-deploying {
  0%, 100% { box-shadow: 0 0 10px rgba(245,196,0,0.15); }
  50%       { box-shadow: 0 0 45px rgba(245,196,0,0.55), inset 0 0 30px rgba(245,196,0,0.06); }
}

@keyframes flip-in {
  0%   { transform: rotateY(90deg) translateY(-10px); opacity: 0; }
  100% { transform: rotateY(0deg)  translateY(0);     opacity: 1; }
}
.slot.flip-in { animation: flip-in 0.32s ease-out both; }

@keyframes land-pulse {
  0%   { transform: scale(1.06); box-shadow: 0 0 0 3px var(--accent), 0 0 50px rgba(245,196,0,0.7); border-color: var(--accent); }
  14%  { transform: scale(0.98); box-shadow: 0 0 0 2px var(--accent), 0 0 30px rgba(245,196,0,0.5); }
  30%  { transform: scale(1.0);  box-shadow: 0 0 0 2px var(--accent), 0 0 20px rgba(245,196,0,0.35); }
  100% { transform: scale(1.0);  box-shadow: none; border-color: var(--border); }
}
.slot.landed { animation: land-pulse 1.5s ease-out forwards; }

/* ── Slots grid ─────────────────────────────────────────────────── */
.slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; perspective: 800px; }
@media (max-width: 500px) { .slots-grid { grid-template-columns: 1fr; } }

.slot {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; min-height: 110px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; transition: border-color .15s;
}
.slot.locked { border-color: var(--accent); }
.slot.empty { opacity: 0.35; }

.slot-top { display: flex; justify-content: space-between; align-items: center; }
.slot-cat {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px;
  font-weight: 700; padding: 2px 6px; border-radius: 3px; background: var(--surface2);
}
.cat-support  { color: var(--cat-support); }
.cat-orbital  { color: var(--cat-orbital); }
.cat-eagle    { color: var(--cat-eagle); }
.cat-emplace  { color: var(--cat-emplace); }
.cat-sentry   { color: var(--cat-sentry); }
.cat-backpack { color: var(--cat-backpack); }
.cat-vehicle  { color: var(--cat-vehicle); }

.lock-btn {
  background: none; border: none; cursor: pointer; font-size: 14px;
  padding: 0 0 0 6px; opacity: 0.4; line-height: 1;
}
.lock-btn:hover { opacity: 1; }
.locked .lock-btn { opacity: 1; }

.slot-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
.slot-code { font-size: 22px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
.slot-meta { font-size: 10px; color: var(--dim); margin-top: auto; }

/* ── Pool counter ───────────────────────────────────────────────── */
.pool-info { font-size: 11px; color: var(--dim); margin-bottom: 10px; }
</style>
</head>
<body>

<div class="slots-grid" id="slotsGrid"></div>

 FRV","category":"Vehicles","warbond":null,"source":"Hangar","cooldown_s":480,"call_in":["left","down","right","left","down","up","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/M-104_Incinerator_FRV"},{"id":"exo-49-emancipator-exosuit","name":"EXO-49 Emancipator Exosuit","category":"Vehicles","warbond":null,"source":"Robotics Workshop","cooldown_s":420,"call_in":["left","down","right","up","left","down","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/EXO-49_Emancipator_Exosuit"},{"id":"exo-45-patriot-exosuit","name":"EXO-45 Patriot Exosuit","category":"Vehicles","warbond":null,"source":"Robotics Workshop","cooldown_s":420,"call_in":["left","down","right","up","left","down","down"],"wiki_url":"https://helldivers.wiki.gg/wiki/EXO-45_Patriot_Exosuit"},{"id":"m-102-fast-recon-vehicle","name":"M-102 Fast Recon Vehicle","category":"Vehicles","warbond":null,"source":"Hangar","cooldown_s":480,"call_in":["left","down","right","down","right","down","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/M-102_Fast_Recon_Vehicle"},{"id":"td-220-bastion-mk-xvi","name":"TD-220 Bastion MK XVI","category":"Vehicles","warbond":null,"source":"Hangar","cooldown_s":780,"call_in":["left","down","right","down","left","down","up","down","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/TD-220_Bastion_MK_XVI"},{"id":"exo-55-breakthrough-exosuit","name":"EXO-55 Breakthrough Exosuit","category":"Vehicles","warbond":"Exo Experts","source":"Exo Experts","cooldown_s":420,"call_in":["left","down","right","left","right","down","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/EXO-55_Breakthrough_Exosuit"},{"id":"exo-51-lumberer-exosuit","name":"EXO-51 Lumberer Exosuit","category":"Vehicles","warbond":"Exo Experts","source":"Exo Experts","cooldown_s":420,"call_in":["left","down","right","up","right","left","up"],"wiki_url":"https://helldivers.wiki.gg/wiki/EXO-51_Lumberer_Exosuit"}];
// DATA_END

// ── State ─────────────────────────────────────────────────────────────────────
const LS_KEY = 'hd2_randomizer_v1';
const ARROWS  = { up: '↑', down: '↓', left: '←', right: '→' };
const CAT_CSS = {
  'Support Weapons': 'cat-support',
  'Orbital Strikes': 'cat-orbital',
  'Eagle Strikes':   'cat-eagle',
  'Emplacements':    'cat-emplace',
  'Sentries':        'cat-sentry',
  'Backpacks':       'cat-backpack',
  'Vehicles':        'cat-vehicle',
};

// Full warbond list in release order. type: 'premium' | 'legendary'
// Warbonds with no stratagems yet can still be toggled (future-proof).
const WARBONDS = [
  { name: 'Steeled Veterans',                      type: 'premium'   },
  { name: 'Cutting Edge',                           type: 'premium'   },
  { name: 'Democratic Detonation',                  type: 'premium'   },
  { name: 'Polar Patriots',                         type: 'premium'   },
  { name: 'Viper Commandos',                        type: 'premium'   },
  { name: "Freedom's Flame",                        type: 'premium'   },
  { name: 'Chemical Agents',                        type: 'premium'   },
  { name: 'Truth Enforcers',                        type: 'premium'   },
  { name: 'Urban Legends',                          type: 'premium'   },
  { name: 'Servants of Freedom',                    type: 'premium'   },
  { name: 'Borderline Justice',                     type: 'premium'   },
  { name: 'Masters of Ceremony',                    type: 'premium'   },
  { name: 'Force of Law',                           type: 'premium'   },
  { name: 'Control Group',                          type: 'premium'   },
  { name: 'Dust Devils',                            type: 'premium'   },
  { name: 'Python Commandos',                       type: 'premium'   },
  { name: 'Redacted Regiment',                      type: 'premium'   },
  { name: 'Siege Breakers',                         type: 'premium'   },
  { name: 'Entrenched Division',                    type: 'premium'   },
  { name: 'Exo Experts',                            type: 'premium'   },
  { name: 'Obedient Democracy Support Troopers',    type: 'legendary' },
  { name: 'Righteous Revenants',                    type: 'legendary' },
  { name: 'Helldivers 2 X Warhammer 40k',           type: 'legendary' },
];

// Set of warbond names that actually have stratagems in the current data
const WB_HAS_STRATS = new Set(STRATAGEMS.filter(s => s.warbond).map(s => s.warbond));

function loadWarbonds() {
  try { return new Set(JSON.parse(localStorage.getItem(LS_KEY + '_wb') || '[]')); }
  catch { return new Set(); }
}
function saveWarbonds() {
  localStorage.setItem(LS_KEY + '_wb', JSON.stringify([...selectedWarbonds]));
}

let selectedWarbonds = loadWarbonds();
let slots       = [null, null, null, null];
let locked      = [false, false, false, false];
let isAnimating = false;

// ── Warbond toggles ───────────────────────────────────────────────────────────
function buildWarbonds() {
  const wrap = document.getElementById('wbWrap');
  let lastType = 'premium';

  WARBONDS.forEach(wb => {
    if (wb.type === 'legendary' && lastType === 'premium') {
      const sep = document.createElement('div');
      sep.className = 'wb-sep';
      sep.dataset.label = 'Legendary Warbonds';
      wrap.appendChild(sep);
      lastType = 'legendary';
    }

    const btn = document.createElement('button');
    const isLeg = wb.type === 'legendary';
    const hasStrats = WB_HAS_STRATS.has(wb.name);
    btn.className = 'wb-btn' + (isLeg ? ' wb-legendary' : '') + (selectedWarbonds.has(wb.name) ? ' active' : '');
    btn.textContent = wb.name;
    if (!hasStrats) btn.title = 'No stratagems in this warbond yet';
    btn.onclick = () => {
      if (selectedWarbonds.has(wb.name)) selectedWarbonds.delete(wb.name);
      else selectedWarbonds.add(wb.name);
      btn.classList.toggle('active', selectedWarbonds.has(wb.name));
      saveWarbonds();
      updatePoolInfo();
    };
    wrap.appendChild(btn);
  });
}

function getPool() {
  return STRATAGEMS.filter(s => !s.warbond || selectedWarbonds.has(s.warbond));
}

function updatePoolInfo() {
  document.getElementById('poolInfo').textContent = `${getPool().length} stratagems available`;
}

// ── Randomize ─────────────────────────────────────────────────────────────────
function randomize() {
  if (isAnimating) return;

  const pool = getPool();
  const lockedIds = new Set(slots.map((s, i) => locked[i] && s ? s.id : null).filter(Boolean));
  const avail = pool.filter(s => !lockedIds.has(s.id));

  for (let i = avail.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [avail[i], avail[j]] = [avail[j], avail[i]];
  }

  let pick = 0;
  for (let i = 0; i < 4; i++) {
    if (!locked[i]) slots[i] = avail[pick++] || null;
  }

  const btn = document.querySelector('.btn-randomize');
  const unlocked = locked.map((l, i) => l ? null : i).filter(i => i !== null);
  if (!unlocked.length) { renderSlots(); return; }

  isAnimating = true;
  btn.disabled = true;
  btn.textContent = '⚡ DEPLOYING STRATAGEMS ⚡';

  renderSlots();
  const cards = [...document.querySelectorAll('#slotsGrid .slot')];
  unlocked.forEach(i => { cards[i].style.visibility = 'hidden'; });

  const lastOrder = unlocked.length - 1;
  unlocked.forEach((cardIdx, order) => {
    setTimeout(() => {
      const card = cards[cardIdx];
      card.style.visibility = '';
      card.classList.add('flip-in');
      card.addEventListener('animationend', () => {
        card.classList.remove('flip-in');
        card.classList.add('landed');
        setTimeout(() => card.classList.remove('landed'), 1500);
        if (order === lastOrder) {
          isAnimating = false;
          btn.disabled = false;
          btn.textContent = '🎲 Randomize';
        }
      }, { once: true });
    }, 250 + order * 850);
  });
}

function toggleLock(i) {
  locked[i] = !locked[i];
  renderSlots();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSlots() {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const s = slots[i];
    const div = document.createElement('div');
    div.className = 'slot' + (locked[i] ? ' locked' : '') + (!s ? ' empty' : '');

    if (s) {
      const code     = s.call_in.map(d => ARROWS[d] || d).join(' ');
      const catClass = CAT_CSS[s.category] || '';
      const meta     = `CD: ${s.cooldown_s}s${s.warbond ? '  ·  ' + s.warbond : ''}`;
      div.innerHTML = `
        <div class="slot-top">
          <span class="slot-cat ${catClass}">${s.category}</span>
          <button class="lock-btn" onclick="toggleLock(${i})" title="${locked[i] ? 'Unlock' : 'Lock'}">${locked[i] ? '🔒' : '🔓'}</button>
        </div>
        <div class="slot-name">${s.name}</div>
        <div class="slot-code">${code}</div>
        <div class="slot-meta">${meta}</div>`;
    } else {
      div.innerHTML = `
        <div class="slot-top">
          <span class="slot-cat" style="color:var(--dim)">—</span>
          <button class="lock-btn" onclick="toggleLock(${i})">${locked[i] ? '🔒' : '🔓'}</button>
        </div>
        <div class="slot-name" style="color:var(--dim)">Empty</div>`;
    }
    grid.appendChild(div);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildWarbonds();
updatePoolInfo();
renderSlots();
</script>
